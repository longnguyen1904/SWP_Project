spring:
  application:
    name: marketplace
  profiles:
    active: docker
  datasource:
    # Thêm ?createDatabaseIfNotExist=true để tự tạo DB nếu chưa có
    url: jdbc:mysql://localhost:3306/TALLT_SoftwareMarket?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

server:
  port: 8081

virustotal:
  api-key: fbeee19f2a7b45408e220ff4a07384ff9041af712a50f4fe6eb38b32b3c250b7

cloudinary:
  cloud_name: ${CLOUDINARY_CLOUD_NAME:demo_cloud}
  api_key: ${CLOUDINARY_API_KEY:demo_key}
  api_secret: ${CLOUDINARY_API_SECRET:demo_secret}

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:mysql://mysql-marketplace:3306/TALLT_SoftwareMarket?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}

jwt:
  secret: "TALLT_MARKETPLACE_SUPER_SECRET_KEY_2024_DO_NOT_SHARE" # Chuỗi này càng dài càng tốt
  expiration: 86400000 # Thời hạn 1 ngày (tính bằng milisec)
